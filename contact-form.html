<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h2 class="text-primary mb-4">Contact Form</h2>

    <form>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control form-control-lg"
                    placeholder="Enter full name"
                    aria-label="Full Name">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control form-control-sm"
                    placeholder="Enter email"
                    aria-describedby="emailHelp">
                <div id="emailHelp" class="form-text">
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="4"
                aria-label="Message"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label d-block">Preferred Contact Method</label>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="emailCheck">
                <label class="form-check-label" for="emailCheck">Email</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="phoneCheck">
                <label class="form-check-label" for="phoneCheck">Phone</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="whatsappCheck">
                <label class="form-check-label" for="whatsappCheck">WhatsApp</label>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Favorite Color</label>
            <input type="color" class="form-control form-control-color"
                aria-label="Favorite Color">
        </div>

        <div class="mb-3">
            <label class="form-label">User ID</label>
            <input type="text" class="form-control bg-danger text-white"
                value="USER12345"
                disabled>
        </div>

        <div class="mb-3">
            <label class="form-label">Account Type</label>
            <input type="text" class="form-control-plaintext"
                value="Student"
                readonly>
        </div>

        <button type="submit" class="btn btn-success">
            Submit
        </button>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
